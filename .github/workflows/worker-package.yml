name: Package Worker Runtime

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_VERSION: 10.0.103
  WORKER_PROJECT: worker/src/CortexTerminal.Worker/CortexTerminal.Worker.csproj
  NSSM_PACKAGE_VERSION: 2.24.101.20180116
  NSSM_ARCHIVE_BASENAME: nssm-2.24-101-g897c7ad
  NSSM_ARCHIVE_URL: https://www.nssm.cc/ci/nssm-2.24-101-g897c7ad.zip
  NSSM_ARCHIVE_SHA256: 99F5045FFFBFFB745D67FE3A065A953C4A3D9C253B868892D9B685B0EE7D07B8

jobs:
  package-linux-x64:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish worker for linux-x64
        run: |
          dotnet publish "${{ env.WORKER_PROJECT }}" -c Release -r linux-x64 \
            --self-contained true \
            /p:PublishSingleFile=true \
            /p:IncludeNativeLibrariesForSelfExtract=true \
            /p:DebugType=None \
            /p:DebugSymbols=false \
            -o artifacts/worker/linux-x64

      - name: Write linux-x64 package version metadata
        shell: bash
        run: |
          package_version="${GITHUB_REF_NAME#v}"
          if [[ -z "$package_version" || "$package_version" == "$GITHUB_REF_NAME" ]]; then
            package_version="0.0.0-dev.${GITHUB_RUN_NUMBER}"
          fi

          printf '%s\n' "$package_version" > artifacts/worker/linux-x64/package-version.txt

      - name: Archive linux-x64 package
        run: |
          mkdir -p artifacts/release
          tar -C artifacts/worker -czf artifacts/release/cortex-terminal-worker-linux-x64.tar.gz linux-x64

      - name: Upload linux-x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: cortex-terminal-worker-linux-x64
          path: artifacts/release/cortex-terminal-worker-linux-x64.tar.gz
          if-no-files-found: error

  package-osx-arm64:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish worker for osx-arm64
        run: |
          dotnet publish "${{ env.WORKER_PROJECT }}" -c Release -r osx-arm64 \
            --self-contained true \
            /p:PublishSingleFile=true \
            /p:IncludeNativeLibrariesForSelfExtract=true \
            /p:DebugType=None \
            /p:DebugSymbols=false \
            -o artifacts/worker/osx-arm64

      - name: Write osx-arm64 package version metadata
        shell: bash
        run: |
          package_version="${GITHUB_REF_NAME#v}"
          if [[ -z "$package_version" || "$package_version" == "$GITHUB_REF_NAME" ]]; then
            package_version="0.0.0-dev.${GITHUB_RUN_NUMBER}"
          fi

          printf '%s\n' "$package_version" > artifacts/worker/osx-arm64/package-version.txt

      - name: Archive osx-arm64 package
        run: |
          mkdir -p artifacts/release
          tar -C artifacts/worker -czf artifacts/release/cortex-terminal-worker-osx-arm64.tar.gz osx-arm64

      - name: Upload osx-arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: cortex-terminal-worker-osx-arm64
          path: artifacts/release/cortex-terminal-worker-osx-arm64.tar.gz
          if-no-files-found: error

  package-win-x64:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish worker for win-x64
        shell: pwsh
        run: |
          dotnet publish "${{ env.WORKER_PROJECT }}" -c Release -r win-x64 `
            --self-contained true `
            /p:PublishSingleFile=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:DebugType=None `
            /p:DebugSymbols=false `
            -o artifacts/worker/win-x64

      - name: Write win-x64 package version metadata
        shell: pwsh
        run: |
          $packageVersion = $env:GITHUB_REF_NAME.TrimStart('v')
          if ([string]::IsNullOrWhiteSpace($packageVersion) -or $packageVersion -eq $env:GITHUB_REF_NAME) {
            $packageVersion = "0.0.0-dev.$env:GITHUB_RUN_NUMBER"
          }

          Set-Content -Path 'artifacts/worker/win-x64/package-version.txt' -Value $packageVersion -Encoding UTF8

      - name: Bundle pinned NSSM into win-x64 package
        shell: pwsh
        run: |
          $archivePath = Join-Path $env:RUNNER_TEMP ("$env:NSSM_ARCHIVE_BASENAME.zip")
          $extractRoot = Join-Path $env:RUNNER_TEMP $env:NSSM_ARCHIVE_BASENAME
          Invoke-WebRequest -UseBasicParsing -Uri $env:NSSM_ARCHIVE_URL -OutFile $archivePath

          $archiveHash = (Get-FileHash -Algorithm SHA256 -Path $archivePath).Hash.ToUpperInvariant()
          if ($archiveHash -ne $env:NSSM_ARCHIVE_SHA256) {
            throw "Pinned NSSM checksum mismatch. Expected $env:NSSM_ARCHIVE_SHA256 but got $archiveHash"
          }

          if (Test-Path $extractRoot) {
            Remove-Item -Recurse -Force $extractRoot
          }

          Expand-Archive -Path $archivePath -DestinationPath $extractRoot -Force

          $nssmBinary = Get-ChildItem -Path $extractRoot -Recurse -File -Filter 'nssm.exe' |
            Where-Object { $_.FullName -match '[\\/]win64[\\/]nssm\.exe$' } |
            Select-Object -First 1
          if (-not $nssmBinary) {
            throw "Pinned NSSM archive did not contain win64/nssm.exe under extract root: $extractRoot"
          }

          $destination = 'artifacts/worker/win-x64/tools/nssm'
          New-Item -ItemType Directory -Force -Path $destination | Out-Null
          Copy-Item $nssmBinary.FullName (Join-Path $destination 'nssm.exe') -Force
          Copy-Item 'worker/third_party/nssm/LICENSE.txt' (Join-Path $destination 'LICENSE.txt') -Force
          Copy-Item 'worker/third_party/nssm/VERIFICATION.txt' (Join-Path $destination 'VERIFICATION.txt') -Force
          Copy-Item 'worker/THIRD_PARTY_NOTICES.md' 'artifacts/worker/win-x64/THIRD_PARTY_NOTICES.md' -Force

      - name: Archive win-x64 package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/release | Out-Null
          Compress-Archive -Path artifacts/worker/win-x64/* -DestinationPath artifacts/release/cortex-terminal-worker-win-x64.zip -Force

      - name: Verify win-x64 package contents
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.IO.Compression.FileSystem

          $zipPath = 'artifacts/release/cortex-terminal-worker-win-x64.zip'
          $requiredEntries = @(
            'package-version.txt',
            'tools/nssm/nssm.exe',
            'tools/nssm/LICENSE.txt',
            'tools/nssm/VERIFICATION.txt',
            'THIRD_PARTY_NOTICES.md'
          )

          $zip = [System.IO.Compression.ZipFile]::OpenRead($zipPath)
          try {
            $entries = @{}
            foreach ($entry in $zip.Entries) {
              $entries[$entry.FullName] = $entry
            }

            foreach ($requiredEntry in $requiredEntries) {
              if (-not $entries.ContainsKey($requiredEntry)) {
                throw "win-x64 package is missing required entry: $requiredEntry"
              }
            }

            if ($entries['tools/nssm/nssm.exe'].Length -le 0) {
              throw 'win-x64 package contains an empty tools/nssm/nssm.exe entry'
            }
          }
          finally {
            $zip.Dispose()
          }

      - name: Upload win-x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: cortex-terminal-worker-win-x64
          path: artifacts/release/cortex-terminal-worker-win-x64.zip
          if-no-files-found: error

  publish-release-assets:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - package-linux-x64
      - package-osx-arm64
      - package-win-x64
    runs-on: ubuntu-latest

    steps:
      - name: Download linux-x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: cortex-terminal-worker-linux-x64
          path: artifacts/release

      - name: Download osx-arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: cortex-terminal-worker-osx-arm64
          path: artifacts/release

      - name: Download win-x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: cortex-terminal-worker-win-x64
          path: artifacts/release

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/release/cortex-terminal-worker-linux-x64.tar.gz
            artifacts/release/cortex-terminal-worker-osx-arm64.tar.gz
            artifacts/release/cortex-terminal-worker-win-x64.zip
          fail_on_unmatched_files: true
