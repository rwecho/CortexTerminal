<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 定义区域 -->
  <defs>
    <!-- 蓝色渐变 -->
    <linearGradient id="blueGrad" x1="220" y1="520" x2="450" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3BA5F9"/>
      <stop offset="1" stop-color="#38E6FF"/>
    </linearGradient>
    
    <!-- 紫色渐变 -->
    <linearGradient id="purpleGrad" x1="574" y1="804" x2="804" y2="504" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9333EA"/>
      <stop offset="1" stop-color="#C084FC"/>
    </linearGradient>

    <!-- 霓虹外溢光 (中等模糊) -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feFlood flood-opacity="0.6" result="flood"/>
      <feComposite in="flood" in2="blur" operator="in" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/> <!-- 叠加两次增强亮度 -->
      </feMerge>
    </filter>
    
    <!-- 底层氛围光 (大模糊) -->
    <filter id="ambientGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="40" result="blur"/>
    </filter>
  </defs>

  <!-- 背景：纯深黑 -->
  <rect width="1024" height="1024" rx="160" fill="#08080A"/>

  <!-- 绘图组 -->
  
  <!-- 1. 最底层：环境漫反射光 (Ambient Glow) -->
  <g opacity="0.4" filter="url(#ambientGlow)">
    <!-- 统一后的蓝色 L -->
    <path d="M 220 502 V 310 C 220 260.3 260.3 220 310 220 H 502" stroke="url(#blueGrad)" stroke-width="80" stroke-linecap="round"/>
    <!-- 统一后的紫色 L -->
    <path d="M 804 522 V 714 C 804 763.7 763.7 804 714 804 H 522" stroke="url(#purpleGrad)" stroke-width="80" stroke-linecap="round"/>
    <!-- 居中微调后的 Chevron -->
    <path d="M 440 384 L 584 512 L 440 640" stroke="#E0F2FE" stroke-width="85" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- 2. 中间层：霓虹外溢光 (Neon Glow) -->
  <g filter="url(#neonGlow)">
    <path d="M 220 502 V 310 C 220 260.3 260.3 220 310 220 H 502" stroke="url(#blueGrad)" stroke-width="65" stroke-linecap="round"/>
    <path d="M 804 522 V 714 C 804 763.7 763.7 804 714 804 H 522" stroke="url(#purpleGrad)" stroke-width="65" stroke-linecap="round"/>
    <path d="M 440 384 L 584 512 L 440 640" stroke="#E0F2FE" stroke-width="70" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- 3. 顶层：核心清晰线条 (Core Lines - 无滤镜) -->
  <g>
    <!-- 蓝色 L 线条 -->
    <path d="M 220 502 V 310 C 220 260.3 260.3 220 310 220 H 502" stroke="url(#blueGrad)" stroke-width="60" stroke-linecap="round"/>
    <!-- 紫色 L 线条 -->
    <path d="M 804 522 V 714 C 804 763.7 763.7 804 714 804 H 522" stroke="url(#purpleGrad)" stroke-width="60" stroke-linecap="round"/>
    <!-- 中心白色 Chevron -->
    <path d="M 440 384 L 584 512 L 440 640" stroke="#FFFFFF" stroke-width="65" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>